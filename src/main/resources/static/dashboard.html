<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<title>IET Scroll | Dashboard</title>
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

	<style>
		:root {
			--bg-main: #0f172a;
			--sidebar-bg: #1e293b;
			--accent: #3b82f6;
			--card-bg: rgba(30, 41, 59, 0.7);
		}

		body {
			background: var(--bg-main);
			color: #f1f5f9;
			font-family: 'Inter', system-ui, sans-serif;
			overflow-x: hidden;
		}

		/* Sidebar Upgrade */
		.sidebar {
			width: 260px;
			background: var(--sidebar-bg);
			min-height: 100vh;
			border-right: 1px solid #334155;
			position: fixed;
			transition: all 0.3s;
		}

		.sidebar-brand {
			padding: 2rem 1.5rem;
			font-weight: 800;
			font-size: 1.5rem;
			letter-spacing: -1px;
			color: var(--accent);
		}

		.nav-link {
			padding: 12px 20px;
			color: #94a3b8;
			margin: 4px 15px;
			border-radius: 10px;
			display: flex;
			align-items: center;
			transition: 0.2s;
			cursor: pointer;
		}

		.nav-link i {
			margin-right: 12px;
			font-size: 1.2rem;
		}

		.nav-link:hover,
		.nav-link.active {
			background: rgba(59, 130, 246, 0.1);
			color: var(--accent);
		}

		/* Content Area */
		.main-content {
			margin-left: 260px;
			padding: 40px;
			width: calc(100% - 260px);
		}

		/* Glass Cards */
		.stat-card {
			background: var(--card-bg);
			backdrop-filter: blur(10px);
			border: 1px solid #334155;
			border-radius: 16px;
			padding: 24px;
			transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
		}

		.stat-card:hover {
			transform: translateY(-5px);
			border-color: var(--accent);
			box-shadow: 0 10px 30px -10px rgba(59, 130, 246, 0.3);
		}

		.icon-box {
			width: 48px;
			height: 48px;
			border-radius: 12px;
			display: flex;
			align-items: center;
			justify-content: center;
			margin-bottom: 15px;
			background: rgba(59, 130, 246, 0.1);
			color: var(--accent);
		}

		.section {
			display: none;
			animation: fadeIn 0.4s ease-out;
		}

		.section.active {
			display: block;
		}

		@keyframes fadeIn {
			from {
				opacity: 0;
				transform: translateY(10px);
			}

			to {
				opacity: 1;
				transform: translateY(0);
			}
		}

		.btn-primary {
			background: var(--accent);
			border: none;
			padding: 10px 20px;
			border-radius: 8px;
		}

		/* Profile Avatar Placeholder */
		.avatar {
			width: 45px;
			height: 45px;
			background: var(--accent);
			border-radius: 50%;
			display: flex;
			align-items: center;
			justify-content: center;
			font-weight: bold;
		}
	</style>
</head>

<body>

	<div class="d-flex">
		<nav class="sidebar">
			<div class="sidebar-brand">IET SCROLL</div>
			<div class="nav-list">
				<div onclick="show('dashboard', this)" class="nav-link active"><i class="bi bi-grid"></i> Dashboard
				</div>
				<div onclick="show('profile', this)" class="nav-link"><i class="bi bi-person"></i> Profile</div>
				<div onclick="show('lost', this)" class="nav-link"><i class="bi bi-archive"></i> Lost Items</div>
				<div onclick="show('found', this)" class="nav-link"><i class="bi bi-search"></i> Found Items</div>
				<div onclick="show('team', this)" class="nav-link"><i class="bi bi-people"></i> My Team</div>
				<div onclick="show('resume', this)" class="nav-link"><i class="bi bi-file-earmark-text"></i> Resume
				</div>
				<hr class="mx-3 border-secondary">
				<div onclick="logout()" class="nav-link text-danger"><i class="bi bi-box-arrow-left"></i> Logout</div>
			</div>
		</nav>

		<main class="main-content">
			<header class="d-flex justify-content-between align-items-center mb-5">
				<div>
					<h2 id="header-title" class="fw-bold m-0">Overview</h2>
					<p class="text-muted small m-0">Welcome back, <span id="welcome-name">User</span></p>
				</div>
				<div class="d-flex align-items-center gap-3">
					<div class="text-end d-none d-md-block">
						<div id="top-username" class="fw-bold small"></div>
						<div id="top-email" class="text-muted" style="font-size: 11px;"></div>
					</div>
					<div class="avatar">U</div>
				</div>
			</header>

			<div id="dashboard" class="section active">
				<div class="row g-4">
					<div class="col-md-4">
						<div class="stat-card">
							<div class="icon-box"><i class="bi bi-megaphone-fill"></i></div>
							<p class="text-muted small mb-1">Items Reported Lost</p>
							<h2 id="lostCount" class="fw-bold">0</h2>
						</div>
					</div>
					<div class="col-md-4">
						<div class="stat-card">
							<div class="icon-box"><i class="bi bi-check-circle-fill"></i></div>
							<p class="text-muted small mb-1">Items Found</p>
							<h2 id="foundCount" class="fw-bold">0</h2>
						</div>
					</div>
					<div class="col-md-4">
						<div class="stat-card">
							<div class="icon-box"><i class="bi bi-shield-lock-fill"></i></div>
							<p class="text-muted small mb-1">Team Membership</p>
							<h2 id="teamStatus" class="fw-bold">--</h2>
						</div>
					</div>
				</div>

				<div class="stat-card mt-4">
					<h5 class="mb-4">Quick Actions</h5>
					<div class="d-flex gap-3">
						<button class="btn btn-primary btn-sm" onclick="show('lost')"><i class="bi bi-plus-lg"></i>
							Report Lost</button>
						<button class="btn btn-outline-light btn-sm" onclick="show('found')">Report Found</button>
					</div>
				</div>
			</div>

			<div id="profile" class="section">
				<div class="stat-card">
					<h5 class="mb-4">Personal Information</h5>
					<div class="row">
						<div class="col-md-6 mb-3">
							<label class="text-muted small">Full Name</label>
							<p id="p-name" class="fw-bold">--</p>
						</div>
						<div class="col-md-6 mb-3">
							<label class="text-muted small">Branch</label>
							<p id="p-branch" class="fw-bold">--</p>
						</div>
					</div>
				</div>
			</div>

			<div id="lost" class="section">
				<h3>Lost Items Management</h3>
			</div>
			<div id="found" class="section">
				<h3>Found Items Management</h3>
			</div>
			<div id="team" class="section">
				<h3>Team Settings</h3>
			</div>

			<div id="resume" class="section">
				<div class="stat-card col-md-6">
					<h5 class="mb-3">Resume AI Analyzer</h5>
					<input type="file" id="file" class="form-control bg-dark text-white border-secondary mb-3">
					<input type="text" id="role" class="form-control bg-dark text-white border-secondary mb-3"
						placeholder="Target Role (e.g. Java Developer)">
					<button class="btn btn-primary w-100" onclick="uploadResume()">Start Analysis</button>
					<div id="resumeResult" class="mt-3"></div>
				</div>
			</div>
		</main>
	</div>

	<script>

		function isTokenExpired(token) {
			try {
				const payload = JSON.parse(atob(token.split('.')[1]));
				return Date.now() >= payload.exp * 1000;
			} catch {
				return true;
			}
		}
		
		const token = localStorage.getItem("iet_token");
		
		console.log(token);

		if (!token || isTokenExpired(token)) {
			localStorage.removeItem("iet_token");
			window.location.href = "login.html";
		}

		const BASE = "https://iet-scroll.onrender.com";

		function show(id, element) {
			
			document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
			document.getElementById(id).classList.add('active');

			document.getElementById('header-title').textContent = id.charAt(0).toUpperCase() + id.slice(1);

			if (element) {
				document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
				element.classList.add('active');
			}
		}

		async function init() {
			try {
				const headers = {
					Authorization: "Bearer " + token
				};

				// user details
				const resUser = await fetch(BASE + "/api/v1/user", { headers });
				if (resUser.status === 401) return logout();
				const result = await resUser.json();

				document.getElementById('top-username').textContent = result.username;
				document.getElementById('welcome-name').textContent = result.fullName.split(' ')[0];
				document.getElementById('top-email').textContent = result.email;

				document.getElementById('p-name').textContent = result.fullName;
				document.getElementById('p-branch').textContent = result.branch;

				const resLost = await fetch(BASE + "/api/v1/lost-item/me", { headers });
				const lost = await resLost.json();
				document.getElementById('lostCount').textContent = lost.length;

				const resFound = await fetch(BASE + "/api/v1/found-item/me", { headers });
				const found = await resFound.json();
				document.getElementById('foundCount').textContent = found.length;

			} catch (e) {
				console.error("Init failed", e);
				alert(e.message);
			}
		}

		function logout() {
			localStorage.removeItem("iet_token");
			window.location.href = "login.html";
		}

		init();
	</script>
</body>

</html>
