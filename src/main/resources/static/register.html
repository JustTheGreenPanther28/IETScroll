<!DOCTYPE html>

<html class="light" lang="en">

<head>
	<meta charset="utf-8" />
	<meta content="width=device-width, initial-scale=1.0" name="viewport" />
	<title>Register | IET Scroll</title>
	<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
	<script src="/JS/register.js" defer></script>
	<link
		href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Public+Sans:wght@300;400;500;600&amp;display=swap"
		rel="stylesheet" />
	<link
		href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
		rel="stylesheet" />
	<link
		href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
		rel="stylesheet" />
	<script id="tailwind-config">
		tailwind.config = {
			darkMode: "class",
			theme: {
				extend: {
					"colors": {
						"surface-container-highest": "#e1e3e4",
						"on-error-container": "#93000a",
						"tertiary": "#493100",
						"primary-fixed-dim": "#b0c6ff",
						"on-secondary-fixed": "#071e27",
						"tertiary-fixed-dim": "#ffba38",
						"on-surface-variant": "#434652",
						"surface": "#f8f9fa",
						"on-surface": "#191c1d",
						"on-primary-fixed": "#001945",
						"inverse-surface": "#2e3132",
						"on-background": "#191c1d",
						"on-secondary-container": "#526772",
						"surface-dim": "#d9dadb",
						"on-primary-fixed-variant": "#00429c",
						"surface-container-low": "#f3f4f5",
						"surface-container": "#edeeef",
						"error": "#ba1a1a",
						"on-secondary-fixed-variant": "#354a53",
						"on-tertiary-fixed": "#281900",
						"primary": "#003178",
						"surface-tint": "#2b5bb5",
						"on-tertiary-container": "#f9af00",
						"on-primary": "#ffffff",
						"primary-container": "#0d47a1",
						"secondary-container": "#cfe6f2",
						"outline-variant": "#c3c6d4",
						"surface-container-lowest": "#ffffff",
						"on-tertiary": "#ffffff",
						"primary-fixed": "#d9e2ff",
						"background": "#f8f9fa",
						"outline": "#737783",
						"on-error": "#ffffff",
						"on-tertiary-fixed-variant": "#604100",
						"surface-variant": "#e1e3e4",
						"secondary": "#4c616c",
						"error-container": "#ffdad6",
						"surface-bright": "#f8f9fa",
						"tertiary-container": "#674600",
						"on-primary-container": "#a1bbff",
						"inverse-on-surface": "#f0f1f2",
						"inverse-primary": "#b0c6ff",
						"on-secondary": "#ffffff",
						"surface-container-high": "#e7e8e9",
						"secondary-fixed-dim": "#b4cad6",
						"tertiary-fixed": "#ffdeac",
						"secondary-fixed": "#cfe6f2"
					},
					"borderRadius": {
						"DEFAULT": "0.125rem",
						"lg": "0.25rem",
						"xl": "0.5rem",
						"full": "0.75rem"
					},
					"fontFamily": {
						"headline": ["Manrope"],
						"body": ["Public Sans"],
						"label": ["Public Sans"]
					}
				},
			},
		}
	</script>
	<style>
		.material-symbols-outlined {
			font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
		}

		.glass-header {
			backdrop-filter: blur(20px);
		}

		.form-input-focus:focus-within .focus-indicator {
			width: 100%;
		}
	</style>
	<style>
		body {
			min-height: max(884px, 100dvh);
		}
	</style>
</head>

<body class="bg-surface font-body text-on-surface selection:bg-primary-fixed selection:text-on-primary-fixed">
	<!-- TopAppBar: Transactional state means we show a back button but restricted branding -->
	<header
		class="fixed top-0 w-full z-50 bg-blue-50/70 dark:bg-slate-900/70 backdrop-blur-xl border-b border-blue-200/20 dark:border-slate-700/20 shadow-sm shadow-blue-900/5">
		<div class="flex items-center justify-between px-6 h-16 w-full max-w-screen-xl mx-auto">
			<button
				class="p-2 -ml-2 text-blue-900 dark:text-blue-100 hover:bg-blue-100/50 dark:hover:bg-slate-800/50 transition-colors active:scale-95 duration-200 rounded-full">
				<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
			</button>
			<h1 class="text-xl font-extrabold tracking-tighter text-blue-900 dark:text-blue-50 font-headline">IET Scroll
			</h1>
			<div class="w-10"></div> <!-- Spacer for centering -->
		</div>
	</header>
	<main class="pt-24 pb-12 px-6 min-h-screen flex flex-col items-center">
		<div class="w-full max-w-3xl">
			<!-- Hero Heading -->
			<div class="mb-12">
				<p class="font-label text-sm uppercase tracking-widest text-on-surface-variant font-semibold mb-2">
					Academic Portal</p>
				<h2 class="font-headline text-4xl md:text-5xl font-bold tracking-tight text-primary leading-tight">
					Join the Scholarly <br /><span class="text-tertiary-container">Ecosystem</span>
				</h2>
				<div class="h-1 w-24 bg-primary-container mt-6 rounded-full"></div>
			</div>
			<!-- Registration Form Canvas -->
			<form class="space-y-12">
				<!-- Section: Identity -->
				<div class="bg-surface-container-low p-8 rounded-xl">
					<h3 class="font-headline text-lg font-bold mb-6 flex items-center gap-2">
						<span class="material-symbols-outlined text-primary" data-icon="fingerprint">fingerprint</span>
						Personal Identity
					</h3>
					<div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
						<!-- Full Name -->
						<div class="group relative form-input-focus">
							<label class="block font-label text-xs font-semibold text-on-surface-variant mb-1 ml-1">Full
								Name</label>
							<input
								class="w-full bg-surface-container-lowest border-none rounded-lg px-4 py-3 text-on-surface placeholder:text-outline/40 focus:ring-0 transition-all"
								placeholder="Dr. Julian Vane" type="text" />
							<div
								class="focus-indicator absolute bottom-0 left-1/2 -translate-x-1/2 h-0.5 w-0 bg-primary transition-all duration-300">
							</div>
						</div>
						<!-- Username -->
						<div class="group relative form-input-focus">
							<label
								class="block font-label text-xs font-semibold text-on-surface-variant mb-1 ml-1">Username</label>
							<input
								class="w-full bg-surface-container-lowest border-none rounded-lg px-4 py-3 text-on-surface placeholder:text-outline/40 focus:ring-0 transition-all"
								placeholder="jvane_scholar" type="text" />
							<div
								class="focus-indicator absolute bottom-0 left-1/2 -translate-x-1/2 h-0.5 w-0 bg-primary transition-all duration-300">
							</div>
						</div>
						<!-- Email -->
						<div class="group relative form-input-focus md:col-span-2">
							<label
								class="block font-label text-xs font-semibold text-on-surface-variant mb-1 ml-1">Email
								Address</label>
							<input
								class="w-full bg-surface-container-lowest border-none rounded-lg px-4 py-3 text-on-surface placeholder:text-outline/40 focus:ring-0 transition-all"
								placeholder="vane.academic@iet.edu" type="email" />
							<div
								class="focus-indicator absolute bottom-0 left-1/2 -translate-x-1/2 h-0.5 w-0 bg-primary transition-all duration-300">
							</div>
						</div>
						<!-- Password -->
						<div class="group relative form-input-focus md:col-span-2">
							<label
								class="block font-label text-xs font-semibold text-on-surface-variant mb-1 ml-1">Password</label>
							<input
								class="w-full bg-surface-container-lowest border-none rounded-lg px-4 py-3 text-on-surface placeholder:text-outline/40 focus:ring-0 transition-all"
								placeholder="••••••••••••" type="password" />
							<div
								class="focus-indicator absolute bottom-0 left-1/2 -translate-x-1/2 h-0.5 w-0 bg-primary transition-all duration-300">
							</div>
						</div>
					</div>
				</div>
				<!-- Section: Academic Background -->
				<div class="bg-surface-container-low p-8 rounded-xl relative overflow-hidden">
					<div class="absolute top-0 right-0 w-32 h-32 opacity-5 translate-x-8 -translate-y-8">
						<span class="material-symbols-outlined text-[120px]" data-icon="school">school</span>
					</div>
					<h3 class="font-headline text-lg font-bold mb-6 flex items-center gap-2">
						<span class="material-symbols-outlined text-primary" data-icon="menu_book">menu_book</span>
						Scholarly Credentials
					</h3>
					<div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
						<!-- Course -->
						<div class="group relative form-input-focus">
							<label
								class="block font-label text-xs font-semibold text-on-surface-variant mb-1 ml-1">Course</label>
							<select
								class="w-full bg-surface-container-lowest border-none rounded-lg px-4 py-3 text-on-surface focus:ring-0 transition-all appearance-none cursor-pointer">
								<option>Bachelor of Technology</option>
								<option>Master of Engineering</option>
								<option>PhD Research</option>
							</select>
							<div
								class="focus-indicator absolute bottom-0 left-1/2 -translate-x-1/2 h-0.5 w-0 bg-primary transition-all duration-300">
							</div>
						</div>
						<!-- Branch -->
						<div class="group relative form-input-focus">
							<label
								class="block font-label text-xs font-semibold text-on-surface-variant mb-1 ml-1">Branch</label>
							<select
								class="w-full bg-surface-container-lowest border-none rounded-lg px-4 py-3 text-on-surface focus:ring-0 transition-all appearance-none cursor-pointer">
								<option value="COMPUTER_SCIENCE_AND_BUSINESS_SYSTEM">Computer Science &amp; Business
									System</option>
								<option value="COMPUTER_SCIENCE">Computer Science</option>
								<option value="INFORMATION_TECHNOLOGY">Information Technology</option>
								<option value="ELECTRONICS_AND_TELECOMMUNICATION_ENGINEERING">Electronics &amp;
									Telecommunication Engineering</option>
								<option value="ELECTRONICS_AND_INSTRUMENTATION_ENGINEERING">Electronics &amp;
									Instrumentation Engineering</option>
								<option value="MECHANICAL_ENGINEERING">Mechanical Engineering</option>
								<option value="CIVIL_ENGINEERING">Civil Engineering</option>
								<option value="OTHER">Other</option>
							</select>
							<div
								class="focus-indicator absolute bottom-0 left-1/2 -translate-x-1/2 h-0.5 w-0 bg-primary transition-all duration-300">
							</div>
						</div>
						<!-- Year of Passout -->
						<div class="group relative form-input-focus md:col-span-2">
							<label class="block font-label text-xs font-semibold text-on-surface-variant mb-1 ml-1">Year
								of Passout</label>
							<div class="flex gap-4">
								<input
									class="flex-1 bg-surface-container-lowest border-none rounded-lg px-4 py-3 text-on-surface placeholder:text-outline/40 focus:ring-0 transition-all"
									max="2035" min="1950" placeholder="2024" type="number" />
								<div
									class="bg-primary-fixed flex items-center px-4 rounded-lg text-on-primary-fixed text-xs font-bold font-label">
									EST.</div>
							</div>
							<div
								class="focus-indicator absolute bottom-0 left-1/2 -translate-x-1/2 h-0.5 w-0 bg-primary transition-all duration-300">
							</div>
						</div>
					</div>
				</div>
				<!-- Submit and Footer -->
				<div class="flex flex-col items-center gap-8 pt-6">
					<button
						class="w-full md:w-2/3 py-4 px-8 bg-gradient-to-tr from-primary to-primary-container text-on-primary font-headline font-bold text-lg rounded-xl shadow-lg shadow-primary/10 active:scale-95 transition-all duration-200 hover:brightness-110"
						type="submit">
						Create Account
					</button>
					<div class="flex flex-col items-center gap-2">
						<span class="text-on-surface-variant text-sm">Already a member of the institute?</span>
						<a class="group flex items-center gap-1 font-bold text-primary hover:text-primary-container transition-colors"
							href="#">
							<span class="material-symbols-outlined text-sm" data-icon="login">login</span>
							Back to Login
							<span
								class="block h-px w-0 group-hover:w-full bg-primary transition-all duration-300"></span>
						</a>
					</div>
				</div>
			</form>
		</div>
	</main>
</body>

</html>
