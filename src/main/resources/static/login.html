<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Login — IET Scroll</title>
	<link
		href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap"
		rel="stylesheet" />
	<style>
		:root {
			--cream: #FAF7F2;
			--ink: #1A1410;
			--ink-soft: #3D3530;
			--accent: #C84B11;
			--accent-gold: #D4A843;
			--green-dark: #1C3022;
			--muted: #8A7F78;
			--border: #E8E0D5;
			--error: #D94F3D;

			--font-display: 'Playfair Display', Georgia, serif;
			--font-body: 'DM Sans', sans-serif;
			--font-mono: 'Space Mono', monospace;
		}

		*,
		*::before,
		*::after {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}

		html {
			scroll-behavior: smooth;
		}

		body {
			font-family: var(--font-body);
			background: var(--ink);
			color: var(--cream);
			min-height: 100vh;
			display: flex;
			flex-direction: column;
			overflow-x: hidden;
		}

		/* ── BACKGROUND ── */
		.page-bg {
			position: fixed;
			inset: 0;
			z-index: 0;
			background:
				radial-gradient(ellipse at 80% 10%, rgba(46, 84, 56, 0.4) 0%, transparent 55%),
				radial-gradient(ellipse at 15% 85%, rgba(200, 75, 17, 0.18) 0%, transparent 50%),
				radial-gradient(ellipse at 50% 50%, rgba(212, 168, 67, 0.05) 0%, transparent 60%);
			background-color: var(--ink);
		}

		.page-bg::after {
			content: '';
			position: absolute;
			inset: 0;
			background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
			opacity: 0.35;
			pointer-events: none;
		}

		/* ── NAV ── */
		.top-nav {
			position: relative;
			z-index: 10;
			padding: 1.2rem 2rem;
			display: flex;
			align-items: center;
			justify-content: space-between;
			border-bottom: 1px solid rgba(255, 255, 255, 0.06);
		}

		.nav-logo {
			font-family: var(--font-display);
			font-size: 1.25rem;
			font-weight: 700;
			color: var(--cream);
			text-decoration: none;
			letter-spacing: -0.02em;
		}

		.nav-logo span {
			color: var(--accent-gold);
		}

		.nav-logo small {
			font-family: var(--font-mono);
			font-size: 0.5rem;
			letter-spacing: 0.12em;
			color: rgba(250, 247, 242, 0.35);
			vertical-align: middle;
			margin-left: 4px;
		}

		.nav-register {
			font-family: var(--font-mono);
			font-size: 0.68rem;
			letter-spacing: 0.1em;
			text-transform: uppercase;
			color: rgba(250, 247, 242, 0.55);
			text-decoration: none;
			transition: color 0.2s;
		}

		.nav-register span {
			color: var(--accent-gold);
		}

		.nav-register:hover {
			color: var(--cream);
		}

		/* ── LAYOUT ── */
		.page-body {
			position: relative;
			z-index: 1;
			flex: 1;
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 3rem 1.5rem 4rem;
		}

		.login-wrap {
			width: 100%;
			max-width: 460px;
			animation: fadeUp 0.45s ease both;
		}

		/* ── HEADER ── */
		.login-header {
			margin-bottom: 2.25rem;
		}

		.login-eyebrow {
			font-family: var(--font-mono);
			font-size: 0.65rem;
			letter-spacing: 0.2em;
			text-transform: uppercase;
			color: var(--accent-gold);
			margin-bottom: 0.75rem;
			display: block;
		}

		.login-title {
			font-family: var(--font-display);
			font-size: clamp(2.2rem, 6vw, 3.2rem);
			font-weight: 900;
			line-height: 1.0;
			letter-spacing: -0.03em;
			color: var(--cream);
		}

		.login-title em {
			font-style: italic;
			color: var(--accent-gold);
		}

		.login-sub {
			margin-top: 0.7rem;
			font-size: 0.87rem;
			color: rgba(250, 247, 242, 0.4);
			font-weight: 300;
			line-height: 1.6;
		}

		/* ── CARD ── */
		.login-card {
			background: rgba(250, 247, 242, 0.04);
			border: 1px solid rgba(255, 255, 255, 0.08);
			padding: 2rem;
			backdrop-filter: blur(8px);
		}

		/* ── FIELD ── */
		.field {
			margin-bottom: 1.25rem;
		}

		.field-label {
			display: block;
			font-family: var(--font-mono);
			font-size: 0.6rem;
			letter-spacing: 0.16em;
			text-transform: uppercase;
			color: rgba(250, 247, 242, 0.45);
			margin-bottom: 0.45rem;
		}

		.field-input {
			width: 100%;
			background: rgba(255, 255, 255, 0.05);
			border: 1px solid rgba(255, 255, 255, 0.1);
			color: var(--cream);
			font-family: var(--font-body);
			font-size: 0.93rem;
			padding: 0.75rem 0.95rem;
			outline: none;
			transition: border-color 0.2s, background 0.2s;
		}

		.field-input::placeholder {
			color: rgba(250, 247, 242, 0.22);
		}

		.field-input:focus {
			border-color: var(--accent-gold);
			background: rgba(255, 255, 255, 0.08);
		}

		.field-input.error {
			border-color: var(--error);
		}

		.field-error {
			font-family: var(--font-mono);
			font-size: 0.58rem;
			letter-spacing: 0.06em;
			color: var(--error);
			margin-top: 0.35rem;
			display: none;
		}

		.field-error.show {
			display: block;
		}

		/* password toggle */
		.pw-wrap {
			position: relative;
		}

		.pw-toggle {
			position: absolute;
			right: 0.9rem;
			top: 50%;
			transform: translateY(-50%);
			background: none;
			border: none;
			color: rgba(250, 247, 242, 0.35);
			cursor: pointer;
			font-size: 0.75rem;
			font-family: var(--font-mono);
			letter-spacing: 0.05em;
			padding: 0;
			transition: color 0.2s;
		}

		.pw-toggle:hover {
			color: var(--accent-gold);
		}

		/* ── ALERT ── */
		.alert {
			padding: 0.85rem 1rem;
			font-family: var(--font-mono);
			font-size: 0.7rem;
			letter-spacing: 0.06em;
			line-height: 1.5;
			margin-bottom: 1rem;
			display: none;
		}

		.alert.show {
			display: block;
		}

		.alert.fail {
			background: rgba(200, 75, 17, 0.15);
			border: 1px solid rgba(200, 75, 17, 0.3);
			color: #f5a88a;
		}

		.alert.success {
			background: rgba(46, 84, 56, 0.4);
			border: 1px solid rgba(100, 180, 100, 0.3);
			color: #a8e6b0;
		}

		/* ── SUBMIT ── */
		.submit-btn {
			width: 100%;
			font-family: var(--font-mono);
			font-size: 0.78rem;
			font-weight: 700;
			letter-spacing: 0.12em;
			text-transform: uppercase;
			color: var(--ink);
			background: var(--accent-gold);
			border: none;
			padding: 1rem;
			cursor: pointer;
			transition: background 0.2s, transform 0.15s;
			position: relative;
			overflow: hidden;
		}

		.submit-btn:hover:not(:disabled) {
			background: #e8ba55;
			transform: translateY(-1px);
		}

		.submit-btn:disabled {
			opacity: 0.6;
			cursor: not-allowed;
			transform: none;
		}

		.submit-btn .btn-text {
			transition: opacity 0.2s;
		}

		.submit-btn .btn-loader {
			display: none;
			position: absolute;
			inset: 0;
			align-items: center;
			justify-content: center;
			font-size: 0.7rem;
			letter-spacing: 0.15em;
		}

		.submit-btn.loading .btn-text {
			opacity: 0;
		}

		.submit-btn.loading .btn-loader {
			display: flex;
		}

		/* ── FOOTER ── */
		.login-footer-note {
			text-align: center;
			margin-top: 1.5rem;
			font-family: var(--font-mono);
			font-size: 0.62rem;
			letter-spacing: 0.08em;
			color: rgba(250, 247, 242, 0.3);
		}

		.login-footer-note a {
			color: var(--accent-gold);
			text-decoration: none;
		}

		.login-footer-note a:hover {
			text-decoration: underline;
		}

		/* ── ANIMATION ── */
		@keyframes fadeUp {
			from {
				opacity: 0;
				transform: translateY(18px);
			}

			to {
				opacity: 1;
				transform: translateY(0);
			}
		}
	</style>
</head>

<body>

	<div class="page-bg"></div>

	<!-- NAV -->
	<nav class="top-nav">
		<a href="index.html" class="nav-logo">IET <span>Scroll</span> <small>BETA</small></a>
		<a href="register.html" class="nav-register">New here? <span>Register →</span></a>
	</nav>

	<!-- MAIN -->
	<main class="page-body">
		<div class="login-wrap">

			<div class="login-header">
				<span class="login-eyebrow">IET DAVV · Students Only</span>
				<h1 class="login-title">Welcome<br /><em>back.</em></h1>
				<p class="login-sub">Sign in with your institute email to continue.</p>
			</div>

			<div class="login-card">

				<div class="alert" id="formAlert"></div>

				<form id="loginForm" novalidate>

					<div class="field">
						<label class="field-label" for="email">Institute Email</label>
						<input class="field-input" type="email" id="email" placeholder="yourname@ietdavv.edu.in"
							autocomplete="email" />
						<span class="field-error" id="err-email">Must be @ietdavv.edu.in</span>
					</div>

					<div class="field">
						<label class="field-label" for="password">Password</label>
						<div class="pw-wrap">
							<input class="field-input" type="password" id="password" placeholder="Your password"
								autocomplete="current-password" style="padding-right:4rem" />
							<button type="button" class="pw-toggle" id="pwToggle">show</button>
						</div>
						<span class="field-error" id="err-password">Password is required</span>
					</div>

					<button type="submit" class="submit-btn" id="submitBtn">
						<span class="btn-text">Login</span>
						<span class="btn-loader">Signing in…</span>
					</button>

				</form>
			</div>

			<p class="login-footer-note">
				Don't have an account? <a href="register.html">Register here</a>
			</p>

		</div>
	</main>

	<script>
		const BASE = 'https://iet-scroll.onrender.com';

		//PASSWORD => HIDE/SHOW
		const pwInput = document.getElementById('password');
		const pwToggle = document.getElementById('pwToggle');
		pwToggle.addEventListener('click', () => {
			const show = pwInput.type === 'password';
			pwInput.type = show ? 'text' : 'password';
			pwToggle.textContent = show ? 'hide' : 'show';
		});

		function setError(id, msg) {
			const err = document.getElementById('err-' + id);
			const input = document.getElementById(id);
			if (msg) {
				err.textContent = msg;
				err.classList.add('show');
				input.classList.add('error');
			} else {
				err.classList.remove('show');
				input.classList.remove('error');
			}
		}

		function showAlert(type, msg) {
			const el = document.getElementById('formAlert');
			el.className = 'alert show ' + type;
			el.textContent = msg;
		}

		function validate() {
			let ok = true;
			const email = document.getElementById('email').value.trim();
			const password = document.getElementById('password').value;

			setError('email', '');
			setError('password', '');

			if (!email) {
				setError('email', 'Must be a valid @ietdavv.edu.in email');
				ok = false;
			}
			if (!password) {
				setError('password', 'Password is required');
				ok = false;
			}
			return ok;
		}

		document.getElementById('loginForm').addEventListener('submit', async (e) => {
			e.preventDefault();
			if (!validate()) return;

			const btn = document.getElementById('submitBtn');
			btn.classList.add('loading');
			btn.disabled = true;
			document.getElementById('formAlert').className = 'alert';

			const payload = {
				email: document.getElementById('email').value.trim(),
				password: document.getElementById('password').value,
			};

			try {
				const res = await fetch(`${BASE}/login`, {
					method: 'POST',
					headers: {'Content-Type': 'application/json'},
					body: JSON.stringify(payload),
				});

				if (res.ok) {
					const contentType = res.headers.get('content-type') || '';
					let token = '';

					if (contentType.includes('application/json')) {
						const data = await res.json();
						token = data.token || data.jwt || data.accessToken || '';
					} else {
						token = await res.text();
					}

					if (token) {
					    const cleanToken = token.replace("Bearer ", "").trim();
					    localStorage.setItem('iet_token', cleanToken);
					}
					console.log(token);
					showAlert('success', 'Login successful! Redirecting…');
					setTimeout(() => {window.location.href = BASE +'/dashboard.html';}, 1400);
				} else {
					const contentType = res.headers.get('content-type') || '';
					let msg = 'Incorrect email or password.';
					if (contentType.includes('application/json')) {
						const data = await res.json();
						msg = data.message || data.error || msg;
					}
					showAlert('fail', msg);
				}
			} catch {
				showAlert('fail', 'Could not reach the server. Please try again.');
			} finally {
				btn.classList.remove('loading');
				btn.disabled = false;
			}
		});
	</script>
</body>

</html>
