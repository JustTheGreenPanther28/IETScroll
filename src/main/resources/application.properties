server.port=4040
spring.application.name=IETScroll

spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.url=${DATABASE_URL}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


spring.ai.openai.api-key=${Nvidia_AI_Key}
spring.ai.openai.base-url=https://integrate.api.nvidia.com
#I am using this model, Link : https://build.nvidia.com/google/gemma-2-2b-it
spring.ai.openai.chat.options.model=mistralai/mistral-small-4-119b-2603


jwt.secret=${JWT_SECRET}
SENDGRID_API_KEY=${SENDGRID_API_KEY}
server.address=0.0.0.0