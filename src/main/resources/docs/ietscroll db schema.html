
<div id="erd" style="padding: 8px 0"></div>
<style>
#erd svg { max-width: 100%; }
</style>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});

const diagram = `erDiagram
  users {
    int userId PK
    uuid publicUserId
    string username UK
    string fullName
    string email UK
    year yearOfPassout
    string course
    string branch
    string encryptedPassword
    boolean isVerified
    string role
  }
  otp {
    int id PK
    string email
    int otp
    datetime expirationTime
  }
  LostItem {
    int id PK
    uuid publicIdOfLostRequest UK
    string lostItemname
    text imageURL UK
    string predictedLocation
    string description
    string status
    int prize
    string ownerEmail FK
    datetime createdAt
  }
  FoundItem {
    int id PK
    uuid publicIdOfFoundItem UK
    string foundItemName
    text imageURL UK
    string predictedLocation
    string description
    string status
    string contactTo FK
    datetime createdAt
  }
  team_finder {
    long id PK
    uuid publicId UK
    string createdBy FK
    string purpose
    string status
    string privacy
    int maxMember
    int currentMember
    datetime createdAt
  }
  skills {
    int id PK
    string skillName UK
    string branch
    string category
  }
  team_finder_skills {
    int id PK
    long team_finder_id FK
    int skill_id FK
  }
  team_join_requests {
    int id PK
    string applicant_email FK
    uuid team_id FK
    string message
    datetime requestedAt
    string status
  }

  users ||--o{ LostItem : "reports"
  users ||--o{ FoundItem : "reports"
  users ||--o{ team_finder : "creates"
  users ||--o{ team_join_requests : "applies"
  team_finder ||--o{ team_finder_skills : "requires"
  skills ||--o{ team_finder_skills : "used in"
  team_finder ||--o{ team_join_requests : "receives"
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
